// R32[i] = winner of R64[i*2] vs winner of R64[i*2+1]
// S16[i] = winner of R32[i*2] vs winner of R32[i*2+1]
// E8[0]  = winner of S16[0] vs winner of S16[1]
// FF_EW  = East E8 winner vs West E8 winner
// FF_MS  = Midwest E8 winner vs South E8 winner
// CHAMP  = FF_EW winner vs FF_MS winner

const R32 = { East:['ER32_0','ER32_1','ER32_2','ER32_3'], West:['WR32_0','WR32_1','WR32_2','WR32_3'], Midwest:['MR32_0','MR32_1','MR32_2','MR32_3'], South:['SR32_0','SR32_1','SR32_2','SR32_3'] };
const S16 = { East:['ES16_0','ES16_1'], West:['WS16_0','WS16_1'], Midwest:['MS16_0','MS16_1'], South:['SS16_0','SS16_1'] };
const E8  = { East:'EE8', West:'WE8', Midwest:'ME8', South:'SE8' };

// Flat state — gameId -> 't1'|'t2'|null
const picks = {};

function getPick(gameId) { return picks[gameId] || null; }
function setPick(gameId, slot) {
  if (picks[gameId] === slot) { delete picks[gameId]; }
  else { picks[gameId] = slot; }
}

// ── Resolve team for a slot ───────────────────────────────────
// Each game has a t1 and t2 source. We resolve them by tracing back.

function resolveTeam(gameId, slot) {
  // First Four
  const ffGame = FF.find(f => f.id === gameId);
  if (ffGame) return slot === 't1' ? ffGame.t1 : ffGame.t2;

  // R64
  for (const reg of REGIONS) {
    const g = R64[reg].find(g => g.id === gameId);
    if (g) {
      const raw = slot === 't1' ? g.t1 : g.t2;
      if (raw.ff) {
        const w = getPick(raw.ff);
        if (!w) return null;
        const ffg = FF.find(f => f.id === raw.ff);
        const res = w === 't1' ? ffg.t1 : ffg.t2;
        return {...raw, key:res.key, name:res.name};
      }
      return raw;
    }
  }

  // R32: gameId like 'ER32_0', sources = R64[reg][i*2] and R64[reg][i*2+1]
  for (const reg of REGIONS) {
    const idx = R32[reg].indexOf(gameId);
    if (idx >= 0) {
      const srcGame = slot === 't1' ? R64[reg][idx*2] : R64[reg][idx*2+1];
      const w = getPick(srcGame.id);
      if (!w) return null;
      return resolveTeam(srcGame.id, w);
    }
  }

  // S16: sources = R32[reg][i*2] and R32[reg][i*2+1]
  for (const reg of REGIONS) {
    const idx = S16[reg].indexOf(gameId);
    if (idx >= 0) {
      const srcId = slot === 't1' ? R32[reg][idx*2] : R32[reg][idx*2+1];
      const w = getPick(srcId);
      if (!w) return null;
      return resolveTeam(srcId, w);
    }
  }

  // E8: sources = S16[reg][0] and S16[reg][1]
  for (const reg of REGIONS) {
    if (E8[reg] === gameId) {
      const srcId = slot === 't1' ? S16[reg][0] : S16[reg][1];
      const w = getPick(srcId);
      if (!w) return null;
      return resolveTeam(srcId, w);
    }
  }

  // Final Four semis: FF_ES = East vs South, FF_MW = Midwest vs West
  if (gameId === 'FF_ES') {
    const reg = slot === 't1' ? 'East' : 'South';
    const w = getPick(E8[reg]);
    if (!w) return null;
    return resolveTeam(E8[reg], w);
  }
  if (gameId === 'FF_MW') {
    const reg = slot === 't1' ? 'Midwest' : 'West';
    const w = getPick(E8[reg]);
    if (!w) return null;
    return resolveTeam(E8[reg], w);
  }

  // Championship: t1 = FF_ES winner, t2 = FF_MW winner
  if (gameId === 'CHAMP') {
    const srcId = slot === 't1' ? 'FF_ES' : 'FF_MW';
    const w = getPick(srcId);
    if (!w) return null;
    return resolveTeam(srcId, w);
  }

  return null;
}

// ── Invalidation ─────────────────────────────────────────────
// When a pick changes, delete all downstream picks.
// Simple approach: find all game IDs that depend on this one and delete them.

function getDependents(gameId) {
  const deps = [];

  // FF -> R64
  const ff = FF.find(f => f.id === gameId);
  if (ff) { deps.push(ff.r64); }

  // R64 -> R32
  for (const reg of REGIONS) {
    const idx = R64[reg].findIndex(g => g.id === gameId);
    if (idx >= 0) { deps.push(R32[reg][Math.floor(idx/2)]); }
  }

  // R32 -> S16
  for (const reg of REGIONS) {
    const idx = R32[reg].indexOf(gameId);
    if (idx >= 0) { deps.push(S16[reg][Math.floor(idx/2)]); }
  }

  // S16 -> E8
  for (const reg of REGIONS) {
    const idx = S16[reg].indexOf(gameId);
    if (idx >= 0) { deps.push(E8[reg]); }
  }

  // E8 -> FF semi
  if (gameId === E8['East'] || gameId === E8['South'])    deps.push('FF_ES');
  if (gameId === E8['Midwest'] || gameId === E8['West'])  deps.push('FF_MW');

  // FF semi -> Champ
  if (gameId === 'FF_ES' || gameId === 'FF_MW') deps.push('CHAMP');

  return deps;
}

function invalidateAll(gameId) {
  const deps = getDependents(gameId);
  for (const dep of deps) {
    if (picks[dep]) {
      delete picks[dep];
      invalidateAll(dep); // recurse
    }
  }
}

// ── Click handlers ────────────────────────────────────────────
function clickSlot(gameId, slot) {
  const team = resolveTeam(gameId, slot);
  if (!team) return; // source not yet decided
  const prev = getPick(gameId);
  setPick(gameId, slot);
  // If pick changed (including deselect), invalidate downstream
  if (prev !== getPick(gameId)) invalidateAll(gameId);
  render();
}

// ── Rendering ─────────────────────────────────────────────────
function slotHTML(gameId, slot, isFF) {
  const team = resolveTeam(gameId, slot);
  const w = getPick(gameId);
  const isW = w === slot;
  const isL = w && w !== slot;

  // For R64, check if FF prereq unresolved
  if (!isFF) {
    for (const reg of REGIONS) {
      const g = R64[reg].find(g => g.id === gameId);
      if (g) {
        const raw = slot === 't1' ? g.t1 : g.t2;
        if (raw.ff && !getPick(raw.ff)) {
          return `<div class="team-slot empty" style="cursor:not-allowed">
            <div class="seed-badge">${raw.seed}</div><div class="mascot-ph"></div>
            <div class="team-info"><div class="team-name tbd">FF Winner</div></div></div>`;
        }
        break;
      }
    }
  }

  if (!team) {
    return `<div class="team-slot empty"><div class="seed-badge">—</div><div class="mascot-ph"></div><div class="team-info"><div class="team-name tbd">TBD</div></div></div>`;
  }

  const cls = isW ? 'winner' : isL ? 'loser' : '';
  const img = IMGS[team.key] || '';
  const mascotName = MASCOTS[team.key] || '';
  return `<div class="team-slot ${cls}" onclick="clickSlot('${gameId}','${slot}')">
    <div class="seed-badge">${team.seed}</div>
    <img class="mascot-img" src="${img}" alt="${team.name}" onerror="this.style.visibility='hidden'">
    <div class="team-info">
      <div class="team-name">${team.name}</div>
      ${mascotName ? `<div class="mascot-name">${mascotName}</div>` : ''}
    </div>
  </div>`;
}

function box(gameId, isFF, mirror) {
  // mirror=true flips t1/t2 display order so winners advance LEFT (toward center) on right side
  const top = mirror ? 't2' : 't1';
  const bot = mirror ? 't1' : 't2';
  return `<div class="matchup">${slotHTML(gameId,top,isFF)}<div class="divider"></div>${slotHTML(gameId,bot,isFF)}</div>`;
}

function ffBox(ff) {
  const w = getPick(ff.id);
  const mk = (t,s) => {
    const cls = w===s?'winner':w&&w!==s?'loser':'';
    const mascotName = MASCOTS[t.key] || '';
    return `<div class="team-slot ${cls}" onclick="clickSlot('${ff.id}','${s}')">
      <div class="seed-badge">${t.seed}</div>
      <img class="mascot-img" src="${IMGS[t.key]||''}" alt="${t.name}" onerror="this.style.visibility='hidden'">
      <div class="team-info">
        <div class="team-name">${t.name}</div>
        ${mascotName ? `<div class="mascot-name">${mascotName}</div>` : ''}
      </div>
    </div>`;
  };
  return `<div class="matchup" style="min-width:185px">
    <div class="ff-rlabel">FIRST FOUR · ${ff.region}</div>
    ${mk(ff.t1,'t1')}<div class="divider"></div>${mk(ff.t2,'t2')}
  </div>`;
}

function champDisplay() {
  const w = getPick('CHAMP');
  const winner = w ? resolveTeam('CHAMP', w) : null;
  return `<div class="champion-box">
    <div class="champion-label">🏆 Champion</div>
    ${winner
      ? `<img class="champion-img" src="${IMGS[winner.key]||''}" alt="${winner.name}"><div class="champion-name">${winner.name}</div>`
      : `<div style="width:64px;height:64px;border-radius:50%;background:#1e3a5f;margin:0 auto 4px;border:2px dashed #374151"></div><div class="champion-name tbd">TBD</div>`}
  </div>`;
}

function col(games, isR64, height=914) {
  const cls = isR64 ? 'r64' : '';
  const items = games.map(g => `<div style="flex-shrink:0">${g}</div>`).join('');
  return `<div class="round-col ${cls}" style="height:${height}px">${items}</div>`;
}

function rlabel(text, color) {
  return `<div class="rlabel" style="width:210px;color:${color}">${text}</div>`;
}

function render() {
  const root = document.getElementById('bracket-root');

  const GAP = 8; // single source of truth for column gap

  function regCols(reg, reversed) {
    const r64 = R64[reg].map(g => box(g.id, false, false));
    const r32 = R32[reg].map(id => box(id, false, reversed));
    const s16 = S16[reg].map(id => box(id, false, reversed));
    const e8  = box(E8[reg], false, reversed);
    return { r64: col(r64, true), r32: col(r32), s16: col(s16), e8 };
  }

  const eastColor='#60a5fa', westColor='#34d399', midColor='#a78bfa', southColor='#fb923c', centerColor='#f9a825';
  const W = 210; // column width
  const CW = 240; // center column width

  const E = regCols('East',    false);
  const S = regCols('South',   false);

const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzrcgePtn3iGeLV9BB38cetzdmEnuiWT7sJg1rVuzOTeBgyMogXi32DSOQWIJBI4A14bQ/exec';

function buildEntryData(name) {
  // Collect all picks into a structured object
  const entry = { name, timestamp: new Date().toISOString() };

  // First Four
  FF.forEach(ff => {
    const w = getPick(ff.id);
    const team = w ? resolveTeam(ff.id, w) : null;
    entry[ff.id] = team ? team.name : '';
  });

  // R64 through Championship - label each game clearly
  const gameLabels = {
    // East
    E1:'E_1v16', E2:'E_8v9', E3:'E_5v12', E4:'E_4v13',
    E5:'E_6v11', E6:'E_3v14', E7:'E_7v10', E8:'E_2v15',
    ER32_0:'E_R32_1', ER32_1:'E_R32_2', ER32_2:'E_R32_3', ER32_3:'E_R32_4',
    ES16_0:'E_S16_1', ES16_1:'E_S16_2',
    EE8:'E_Elite8',
    // West
    W1:'W_1v16', W2:'W_8v9', W3:'W_5v12', W4:'W_4v13',
    W5:'W_6v11', W6:'W_3v14', W7:'W_7v10', W8:'W_2v15',
    WR32_0:'W_R32_1', WR32_1:'W_R32_2', WR32_2:'W_R32_3', WR32_3:'W_R32_4',
    WS16_0:'W_S16_1', WS16_1:'W_S16_2',
    WE8:'W_Elite8',
    // Midwest
    M1:'M_1v16', M2:'M_8v9', M3:'M_5v12', M4:'M_4v13',
    M5:'M_6v11', M6:'M_3v14', M7:'M_7v10', M8:'M_2v15',
    MR32_0:'M_R32_1', MR32_1:'M_R32_2', MR32_2:'M_R32_3', MR32_3:'M_R32_4',
    MS16_0:'M_S16_1', MS16_1:'M_S16_2',
    ME8:'M_Elite8',
    // South
    S1:'S_1v16', S2:'S_8v9', S3:'S_5v12', S4:'S_4v13',
    S5:'S_6v11', S6:'S_3v14', S7:'S_7v10', S8:'S_2v15',
    SR32_0:'S_R32_1', SR32_1:'S_R32_2', SR32_2:'S_R32_3', SR32_3:'S_R32_4',
    SS16_0:'S_S16_1', SS16_1:'S_S16_2',
    SE8:'S_Elite8',
    // Final rounds
    FF_ES:'FF_East_vs_South',
    FF_MW:'FF_Midwest_vs_West',
    CHAMP:'Champion',
  };

  // Resolve winner for every game
  for (const [gameId, label] of Object.entries(gameLabels)) {
    const w = getPick(gameId);
    let team = null;
    if (w) {
      team = resolveTeam(gameId, w);
    }
    entry[label] = team ? team.name : '';
  }

  return entry;
}

function countPicks() {
  // Count how many of the 63 main bracket games have picks
  const allGameIds = [
    ...Object.values(REGIONS).flatMap(r => []),
    ...REGIONS.flatMap(r => R64[r].map(g => g.id)),
    ...REGIONS.flatMap(r => R32[r]),
    ...REGIONS.flatMap(r => S16[r]),
    ...REGIONS.map(r => E8[r]),
    'FF_ES', 'FF_MW', 'CHAMP'
  ];
  return allGameIds.filter(id => getPick(id)).length;
}

async function submitEntry() {
  const nameInput = document.getElementById('entryName');
  const statusEl = document.getElementById('submitStatus');
  const btn = document.getElementById('submitBtn');
  const name = nameInput.value.trim();

  if (!name) {
    statusEl.style.color = '#f87171';
    statusEl.textContent = '⚠️ Please enter your name first.';
    nameInput.focus();
    return;
  }

  const champion = resolveTeam('CHAMP', getPick('CHAMP'));
  if (!champion) {
    statusEl.style.color = '#f87171';
    statusEl.textContent = '⚠️ Please pick a champion before submitting.';
    return;
  }

  if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    statusEl.style.color = '#f87171';
    statusEl.textContent = '⚠️ Apps Script URL not configured yet.';
    return;
  }

  btn.disabled = true;
  statusEl.style.color = '#9ca3af';
  statusEl.textContent = '⏳ Submitting...';

  try {
    const entry = buildEntryData(name);
    console.log('Submitting entry:', JSON.stringify(entry));
    console.log('To URL:', APPS_SCRIPT_URL);
    const form = new FormData();
    form.append('payload', JSON.stringify(entry));
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: form,
    });
    console.log('Fetch response type:', res.type, 'status:', res.status);
    statusEl.style.color = '#4ade80';
    statusEl.textContent = `✅ Entry submitted for "${name}"! Good luck 🏀`;
    btn.textContent = '✅ Submitted!';
  } catch (err) {
    console.error('Submission error:', err.name, err.message, err.stack);
    statusEl.style.color = '#f87171';
    statusEl.textContent = `❌ Error: ${err.message}`;
    btn.disabled = false;
  }
}

function resetBracket() {
  if (!confirm('Reset all picks?')) return;
  for (const k in picks) delete picks[k];
  render();
}
async function exportImage() {
  const btn = document.querySelector('button[onclick="exportImage()"]');
  btn.disabled = true;
  btn.textContent = '⏳ Exporting...';
  try {
    const wrapper = document.body;
    const canvas = await html2canvas(wrapper, {
      backgroundColor: '#0f172a',
      scale: 2,
      useCORS: true,
      allowTaint: true,
      scrollX: 0,
      scrollY: 0,
      width: wrapper.scrollWidth,
      height: wrapper.scrollHeight,
      windowWidth: wrapper.scrollWidth,
      windowHeight: wrapper.scrollHeight
    });
    const link = document.createElement('a');
    link.download = '2026_NCAA_Mascot_Bracket.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Export failed: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '📸 Export Image';
  }
}

render();
